
<div id="erd" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1B3560' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#042C53',
  },
});

const diagram = `erDiagram
  customers {
    int customer_id PK
    string full_name
    string email
    string phone
    tinyint is_active
  }
  customer_addresses {
    int address_id PK
    int customer_id FK
    string label
    string city
    string pincode
    tinyint is_default
  }
  cuisines {
    tinyint cuisine_id PK
    string cuisine_name
  }
  restaurants {
    int restaurant_id PK
    string name
    string city
    decimal avg_rating
    decimal commission_pct
    time opening_time
    tinyint is_active
  }
  restaurant_cuisines {
    int restaurant_id FK
    tinyint cuisine_id FK
  }
  menu_categories {
    int category_id PK
    int restaurant_id FK
    string category_name
    tinyint is_active
  }
  menu_items {
    int item_id PK
    int restaurant_id FK
    int category_id FK
    string item_name
    decimal price
    tinyint is_veg
    tinyint is_available
  }
  delivery_agents {
    int agent_id PK
    string full_name
    string phone
    enum vehicle_type
    decimal avg_rating
    tinyint is_available
  }
  orders {
    int order_id PK
    int customer_id FK
    int restaurant_id FK
    int agent_id FK
    int delivery_address_id FK
    enum order_status
    decimal total_amount
    datetime placed_at
    datetime delivered_at
  }
  order_items {
    int order_item_id PK
    int order_id FK
    int item_id FK
    tinyint quantity
    decimal unit_price
    decimal item_total
  }
  coupons {
    int coupon_id PK
    string code
    enum discount_type
    decimal discount_value
    int used_count
    date valid_until
  }
  order_coupons {
    int order_id FK
    int coupon_id FK
    decimal discount_applied
  }
  order_status_log {
    int log_id PK
    int order_id FK
    enum status
    datetime changed_at
  }
  agent_locations {
    bigint location_id PK
    int agent_id FK
    int order_id FK
    decimal latitude
    decimal longitude
  }
  payments {
    int payment_id PK
    int order_id FK
    enum payment_method
    enum payment_status
    decimal amount
    datetime paid_at
  }
  invoices {
    int invoice_id PK
    int order_id FK
    string invoice_number
    decimal grand_total
    datetime issued_at
  }
  reviews {
    int review_id PK
    int order_id FK
    int customer_id FK
    int restaurant_id FK
    int agent_id FK
    tinyint food_rating
    tinyint delivery_rating
  }

  customers ||--o{ customer_addresses : "has"
  customers ||--o{ orders : "places"
  customers ||--o{ reviews : "writes"
  restaurants ||--o{ restaurant_cuisines : "serves"
  cuisines ||--o{ restaurant_cuisines : "tagged"
  restaurants ||--o{ menu_categories : "has"
  menu_categories ||--o{ menu_items : "contains"
  restaurants ||--o{ menu_items : "offers"
  restaurants ||--o{ orders : "receives"
  delivery_agents ||--o{ orders : "fulfils"
  delivery_agents ||--o{ agent_locations : "tracks"
  delivery_agents ||--o{ reviews : "rated in"
  customer_addresses ||--o{ orders : "delivers to"
  orders ||--o{ order_items : "has"
  orders ||--o{ order_coupons : "applies"
  orders ||--o{ order_status_log : "logs"
  orders ||--o{ agent_locations : "during"
  orders ||--|| payments : "paid via"
  orders ||--|| invoices : "generates"
  orders ||--o| reviews : "reviewed in"
  menu_items ||--o{ order_items : "included in"
  coupons ||--o{ order_coupons : "used in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
